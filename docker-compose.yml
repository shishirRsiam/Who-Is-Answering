
services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: scalehub_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-scalingdb}
      POSTGRES_USER: ${DB_USER:-scalinguser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-scalingpass123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5442:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-scalinguser} -d ${DB_NAME:-scalingdb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - scalehub_network

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # container_name: scalehub_backend
    deploy:
      replicas: 5
    env_file:
      - .env
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-premium-scaling-docker-jwt-secret-key-2024-production}
      DB_NAME: ${DB_NAME:-scalingdb}
      DB_USER: ${DB_USER:-scalinguser}
      DB_PASSWORD: ${DB_PASSWORD:-scalingpass123}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
    expose:
      - 8000
    networks:
      - scalehub_network
    restart: unless-stopped

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: scalehub_nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8000:80"
    depends_on:
      - backend
    networks:
      - scalehub_network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scalehub_frontend
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000/api/v1}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - scalehub_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local

networks:
  scalehub_network:
    driver: bridge
